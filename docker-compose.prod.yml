version: '3.9'

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB:       gestivo_public
      POSTGRES_USER:     gestivo_user
      POSTGRES_PASSWORD: gestivo_prod_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestivo_user -d gestivo_public"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    environment:
      DEBUG:         "False"
      SECRET_KEY:    "${SECRET_KEY}"
      DB_NAME:       gestivo_public
      DB_USER:       gestivo_user
      DB_PASSWORD:   gestivo_prod_pass
      DB_HOST:       db
      DB_PORT:       "5432"
      REDIS_URL:     redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             gunicorn gestivo_project.wsgi:application
             --bind 0.0.0.0:8000
             --workers 4
             --timeout 120
             --access-logfile -"

  celery_worker:
    build: .
    environment:
      DEBUG:       "False"
      SECRET_KEY:  "${SECRET_KEY}"
      DB_NAME:     gestivo_public
      DB_USER:     gestivo_user
      DB_PASSWORD: gestivo_prod_pass
      DB_HOST:     db
      DB_PORT:     "5432"
      REDIS_URL:   redis://redis:6379/0
    depends_on:
      - backend
    command: celery -A gestivo_project worker --loglevel=info

volumes:
  postgres_data: