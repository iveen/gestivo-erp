name: Gestivo CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB:       gestivo_public
          POSTGRES_USER:     gestivo_user
          POSTGRES_PASSWORD: gestivo_dev_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DEBUG:       "True"
          SECRET_KEY:  "ci-secret-key-not-for-production-use-only"
          DB_NAME:     gestivo_public
          DB_USER:     gestivo_user
          DB_PASSWORD: gestivo_dev_pass
          DB_HOST:     localhost
          DB_PORT:     "5432"
          REDIS_URL:   redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: gestivo_project.settings
        run: |
          pytest apps/ --cov=apps --cov-fail-under=85 -q

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install ruff

      - name: Run ruff
        run: ruff check apps/ gestivo_project/